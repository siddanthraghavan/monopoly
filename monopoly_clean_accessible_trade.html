<title>Local Monopoly</title>
<style>

.screen{display:none}.screen.active{display:block}
#setup.screen.active{min-height:100dvh;padding:clamp(16px,3vw,40px);overflow:auto}
.setup-shell{min-height:calc(100dvh - 80px);display:grid;grid-template-columns:minmax(340px,1fr) minmax(420px,1.16fr);gap:28px;align-items:stretch;max-width:1420px;margin:0 auto}
.hero-card,.setup-card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012));border:1px solid var(--line);border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.38);padding:clamp(28px,4vw,52px);overflow:hidden}

eight:48px;border:1px solid rgba(213,182,83,.32);border-radius:10px;background:#080807;color:var(--ink);padding:0 12px;font-size:18px;font-weight:700}.primary-btn,.ghost-btn{height:56px;border-radius:14px;font-weight:900;letter-spacing:.25em;text-transform:uppercase}.primary-btn{background:#f6efe2;color:#111}.ghost-btn{background:transparent;color:#eee;border:1px solid rgba(213,182,83,.3)}
#game.screen.active{height:100dvh;overflow:hidden;display:grid;grid-template-rows:46px 1fr;background:#060606}.topbar{height:46px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 12px}.brand{letter-spacing:.38em;font-size:11px;color:var(--gold);font-weight:900}.turn-head{font-size:18px;font-weight:900;margin-left:12px}.top-left,.top-actions{display:flex;align-items:center;gap:10px}.pill-btn{height:34px;padding:0 18px;border-radius:20px;background:#0d0b08;color:var(--ink);border:1px solid rgba(213,182,83,.34);font-size:11px;font-weight:900;letter-spacing:.22em}.game-shell{height:calc(100dvh - 46px);display:grid;grid-template-columns:320px minmax(0,1fr);gap:20px;padding:14px 20px 18px;overflow:hidden}.side{display:grid;grid-template-rows:repeat(3,minmax(0,1fr));gap:10px;min-height:0}.player-card{background:linear-gradient(180deg,#191711,#0c0b09);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;min-height:0;transition:border-color .2s,box-shadow .2s}.player-card.active{border-color:var(--green);box-shadow:0 0 0 1px rgba(57,215,115,.45),0 0 24px rgba(57,215,115,.12)}.player-top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(213,182,83,.16);min-height:56px}.mini-token{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:#eee6d4;box-shadow:inset 0 1px 2px rgba(255,255,255,.65),0 2px 7px rgba(0,0,0,.45)}.mini-token svg{width:23px;height:23px;fill:#111}.player-name{font-size:17px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tag{margin-left:auto;padding:8px 14px;border-radius:18px;background:var(--green);color:#001806;font-size:11px;font-weight:900;letter-spacing:.18em}.money-box{padding:14px}.label{color:var(--muted);font-size:11px;letter-spacing:.34em;font-weight:900}.money-val{font-size:40px;line-height:1;font-weight:900;letter-spacing:-.05em;margin-top:6px}.player-card.active .money-val{font-size:50px}.money-val.gain{animation:gain .45s}.money-val.loss{animation:loss .45s}@keyframes gain{50%{color:#51e689;transform:scale(1.04)}}@keyframes loss{50%{color:#ff6860;transform:scale(1.04)}}.player-card.money-gain{animation:cardGain .7s ease}.player-card.money-loss{animation:cardLoss .7s ease}@keyframes cardGain{40%{box-shadow:0 0 0 2px rgba(82,233,137,.8),0 0 32px rgba(82,233,137,.28)}}@keyframes cardLoss{40%{box-shadow:0 0 0 2px rgba(255,102,96,.75),0 0 32px rgba(255,102,96,.22)}}.history-round{margin:18px 0 6px;color:var(--gold);font-size:13px;font-weight:900;letter-spacing:.28em;text-align:left}.trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.list-row.selected{border-color:var(--green);box-shadow:0 0 0 1px rgba(57,215,115,.45);background:#102015}.meta{margin-top:8px;color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.2em}.card-actions{display:grid;gap:8px;padding:0 14px 14px;margin-top:auto}.card-actions button{height:38px;border-radius:10px;background:#0b0a08;color:var(--ink);border:1px solid rgba(213,182,83,.26);font-size:12px;font-weight:900;letter-spacing:.24em}.asset-strip{padding:0 14px 14px}.asset-empty{height:36px;border-radius:10px;border:1px dashed rgba(213,182,83,.25);display:grid;place-items:center;color:#817765;font-size:11px;font-weight:900;letter-spacing:.25em}.asset-chip{display:flex;align-items:center;gap:8px;height:34px;border-radius:9px;background:#0b0a08;border:1px solid rgba(213,182,83,.24);padding:0 10px;font-size:12px;font-weight:800;overflow:hidden}.asset-color{width:7px;height:22px;border-radius:5px;flex:0 0 auto}.board-stage{min-width:0;min-height:0;display:grid;place-items:center;padding:8px}.board-wrap{position:relative;width:min(calc(100dvh - 92px),calc(100vw - 380px));height:min(calc(100dvh - 92px),calc(100vw - 380px));max-width:920px;max-height:920px;min-width:520px;min-height:520px;border-radius:18px;border:3px solid #4b4536;box-shadow:0 24px 70px rgba(0,0,0,.58);background:var(--board);overflow:hidden}#boardSvg{width:100%;height:100%;display:block}.tokens{position:absolute;inset:0;pointer-events:none}.tok{position:absolute;width:44px;height:44px;border-radius:12px;display:grid;place-items:center;transform:translate(-50%,-50%);transition:none;filter:drop-shadow(0 5px 7px rgba(0,0,0,.34));background:#eee6d4;border:3px solid #f8f3e8;will-change:left,top,transform;backface-visibility:hidden}.tok svg{width:28px;height:28px;fill:#111}.tok.jailed{background:#4f4b42;border-color:#a79e8c;box-shadow:inset 0 0 0 2px rgba(0,0,0,.22)}.tok.jailed svg{opacity:.52;filter:grayscale(1)}.tok.jailed:after{content:'🔒';position:absolute;right:-8px;top:-10px;font-size:14px}.tok.step-hop{animation:pieceHop .18s cubic-bezier(.2,.75,.2,1)}@keyframes pieceHop{0%{transform:translate(-50%,-50%) scale(.96)}45%{transform:translate(-50%,-66%) scale(1.04)}100%{transform:translate(-50%,-50%) scale(1)}}.center-ui{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(46%,420px);min-width:300px;background:linear-gradient(180deg,#232017,#0d0c0a);border:2px solid rgba(213,182,83,.28);border-radius:30px;box-shadow:0 24px 55px rgba(0,0,0,.38);padding:22px;display:grid;gap:14px;text-align:center}.center-logo{font-size:clamp(38px,4.5vw,58px);line-height:.9;font-weight:900;letter-spacing:-.06em;white-space:nowrap;overflow:hidden;text-overflow:clip}.instruction{border:1px solid rgba(213,182,83,.4);border-radius:18px;min-height:48px;display:grid;place-items:center;padding:8px 16px;color:#f2e5b6;font-size:17px;font-weight:800;line-height:1.2}.dice-tray{height:100px;border-radius:24px;background:#070706;border:2px solid rgba(213,182,83,.28);display:flex;align-items:center;justify-content:center;gap:18px;cursor:pointer}.dice-tray.ready{box-shadow:0 0 0 2px rgba(57,215,115,.35),0 0 24px rgba(57,215,115,.12)}.die{width:70px;height:70px;border-radius:16px;background:radial-gradient(circle at 30% 20%,#fffaf0,#d4cab7 72%,#9f9687 100%);box-shadow:inset 0 2px 3px rgba(255,255,255,.7),inset 0 -8px 12px rgba(0,0,0,.12),0 8px 0 #8c8376,0 15px 16px rgba(0,0,0,.32);display:grid;place-items:center}.die svg{width:38px;height:38px;fill:#14120f}.dice-tray.rolling .die{animation:diceTumble .13s linear infinite}@keyframes diceTumble{50%{transform:translateY(-4px) rotate(6deg)}}.turn-name{min-height:56px;border-radius:18px;background:rgba(213,182,83,.08);border:1px solid rgba(213,182,83,.35);display:grid;place-items:center;padding:8px 12px;font-size:30px;line-height:1.04;font-weight:900}.action-grid{display:grid;gap:10px}.action-grid.split{grid-template-columns:1fr 1fr}.action-grid button{min-height:56px;border-radius:16px;font-size:22px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.buy{background:#bbefc9;color:#092514}.auction{background:#efd476;color:#1a1305}.pass,.end{background:#12100d;color:#f8f1e6;border:1px solid rgba(213,182,83,.25)}.log-card{min-height:58px;max-height:74px;display:grid;place-items:center;padding:8px 16px;border-radius:16px;background:#d7d0c3;color:#191715;font-size:17px;font-weight:800;line-height:1.16;overflow:hidden}.cash-float{position:fixed;z-index:900;font-size:28px;font-weight:900;color:#52e989;pointer-events:none;animation:cashFly .9s ease-out forwards}@keyframes cashFly{to{transform:translateY(-36px);opacity:0}}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:800;display:none;align-items:center;justify-content:center;padding:24px}.modal.open{display:flex}.modal-card{width:min(520px,calc(100vw - 32px));max-height:calc(100dvh - 48px);overflow:auto;background:#17140f;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.6);padding:24px;text-align:center}.modal-card h2{font-size:30px;line-height:1.05;margin-bottom:12px}.modal-card p{color:#d1c8b8;line-height:1.45}.modal-actions{display:grid;gap:10px;margin-top:18px}.modal-actions button{height:50px;border-radius:12px;font-weight:900;letter-spacing:.18em}.list{display:grid;gap:9px;margin-top:14px}.list-row{background:#0d0b08;border:1px solid rgba(213,182,83,.24);border-radius:12px;padding:12px;text-align:left}.row-title{font-weight:900}.row-sub{color:var(--muted);font-size:13px;margin-top:2px}.close{position:absolute;right:16px;top:16px;width:46px;height:46px;border-radius:50%;background:#0b0a08;border:1px solid rgba(213,182,83,.3);color:#fff;font-size:24px}.corner-flash{position:absolute;font-weight:900;color:#3cf083;font-size:28px;pointer-events:none;animation:cashFly 1s ease-out forwards;z-index:20}
@media(max-width:1100px){.game-shell{grid-template-columns:260px 1fr;gap:14px;padding:12px}.board-wrap{width:min(calc(100dvh - 82px),calc(100vw - 312px));height:min(calc(100dvh - 82px),calc(100vw - 312px));min-width:450px;min-height:450px}.player-card.active .money-val{font-size:42px}.money-val{font-size:34px}.center-ui{width:min(45%,360px);min-width:270px;padding:18px}.center-logo{font-size:40px}.turn-name{font-size:24px}.die{width:58px;height:58px}.dice-tray{height:82px}.action-grid button{font-size:18px;min-height:50px}.log-card{font-size:14px}.setup-shell{grid-template-columns:1fr;max-width:820px}.hero-card{min-height:360px}}
@media(max-width:760px){#game.screen.active{height:auto;min-height:100dvh;overflow:auto}.game-shell{height:auto;grid-template-columns:1fr;overflow:visible}.side{grid-template-rows:auto;grid-template-columns:1fr;order:2}.board-wrap{width:min(96vw,calc(100dvh - 64px));height:min(96vw,calc(100dvh - 64px));min-width:0;min-height:0}.center-ui{width:52%;min-width:230px;padding:14px;border-radius:22px;gap:9px}.center-logo{font-size:30px}.instruction{font-size:13px;min-height:36px}.dice-tray{height:62px;border-radius:16px}.die{width:42px;height:42px;border-radius:10px}.die svg{width:26px;height:26px}.turn-name{font-size:18px;min-height:42px}.action-grid button{font-size:14px;min-height:42px}.log-card{font-size:12px;min-height:42px}.top-actions .pill-btn{padding:0 10px}.setup-shell{display:block}.setup-card,.hero-card{margin-bottom:16px;padding:22px}.hero-title{font-size:56px}.settings{grid-template-columns:1fr}.token-grid{grid-template-columns:repeat(5,36px)}.trade-grid{grid-template-columns:1fr}}

<body>
<section id="setup" class="screen active">
  <div class="setup-shell">
    <div class="hero-card"><div><div class="eyebrow">LOCAL TABLE GAME</div><div class="hero-title">MONO<span>POLY</span></div><p class="hero-sub">A clean local Monopoly game for shared iPad play.</p></div><div class="hero-foot">Build rule: a colour unlocks once every property in that colour is bought.</div></div>
    <div class="setup-card"><div class="setup-title">PLAYERS</div><div id="setupRows" class="player-setup"></div><div class="setup-title">GAME SETTINGS</div><div class="settings"><div class="field"><label>Starting Money</label><input id="startMoney" type="number" min="500" step="100" value="1500"></div><div class="field"><label>Build Rule</label><select id="buildRule"><option value="soldout">Colour sold out</option><option value="ownedset">Traditional full set</option></select></div><div class="field"><label>Auction</label><select id="auctionRule"><option value="on">On</option><option value="off">Off</option></select></div><div class="field"><label>Free Parking</label><select id="parkingRule"><option value="off">No jackpot</option><option value="on">Jackpot</option></select></div></div><button class="primary-btn" onclick="Game.startGame()">Start Game</button><button id="continueBtn" class="ghost-btn" onclick="Game.continueGame()">Continue Saved Game</button><button class="ghost-btn" onclick="Game.clearSave()">Clear Saved Game</button></div>
  </div>
</section>
<section id="game" class="screen">
  <div class="topbar"><div class="top-left"><div class="brand">LOCAL <span>MONOPOLY</span></div><div id="headerTurn" class="turn-head">Ready</div></div><div class="top-actions"><button class="pill-btn" onclick="Game.showHistory()">History</button><button class="pill-btn" onclick="Game.showRules()">Rules</button><button class="pill-btn" onclick="Game.resetToSetup()">New Game</button></div></div>
  <div class="game-shell"><aside id="players" class="side"></aside><main class="board-stage"><div id="boardWrap" class="board-wrap"><svg id="boardSvg" viewBox="0 0 560 560"></svg><div id="tokenLayer" class="tokens"></div><div id="centerUI" class="center-ui"><div class="center-logo">MONO<span>POLY</span></div><div id="instruction" class="instruction">Tap the dice to roll.</div><div id="diceTray" class="dice-tray" role="button" tabindex="0" aria-label="Roll dice" onclick="Game.rollDice()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();Game.rollDice()}"><div id="die1" class="die"></div><div id="die2" class="die"></div></div><div id="turnName" class="turn-name">Player 1</div><div id="actions" class="action-grid"></div><div id="logCard" class="log-card" aria-live="polite">Ready.</div></div></div></main></div>
</section>
<div id="modal" class="modal" onclick="Game.backdrop(event)"><div id="modalCard" class="modal-card"></div></div>
<script>
(()=>{

}

function changeMoney(i,amt){S.players[i].money+=amt;cashFlash(i,amt);scheduleSave()}
function highlightMoney(i,type){const card=$('players').children[i];if(!card)return;card.classList.remove('money-gain','money-loss');void card.offsetWidth;card.classList.add(type==='gain'?'money-gain':'money-loss');setTimeout(()=>card.classList.remove('money-gain','money-loss'),760)}
function cashFlash(i,amt){const card=$('players').children[i];if(!card)return;highlightMoney(i,amt>0?'gain':'loss');const r=card.getBoundingClientRect();const f=document.createElement('div');f.className='cash-float';f.textContent=(amt>0?'+':'-')+'£'+Math.abs(amt);f.style.left=(r.left+r.width*.55)+'px';f.style.top=(r.top+35)+'px';f.style.color=amt>0?'#55ef8c':'#ff6660';document.body.appendChild(f);setTimeout(()=>f.remove(),950)}
function flashAt(pos,text){const g=geom(pos),f=document.createElement('div');f.className='corner-flash';f.textContent=text;f.style.left=((g.x+g.w/2)/B*100)+'%';f.style.top=((g.y+g.h/2)/B*100)+'%';$('boardWrap').appendChild(f);setTimeout(()=>f.remove(),1000)}
function landOn(doubles=false){const p=S.players[S.cur],sp=SP[p.pos],pd=S.props[p.pos];renderAll();if(sp.t==='gotojail')return goJail(S.cur);if(sp.t==='tax'){payBank(S.cur,sp.tax);S.phase='done';renderAll();return}if(sp.t==='ch'||sp.t==='cc')return drawCard(sp.t);if(pd){if(pd.owner==null){S.phase='buy';S.pending={pos:p.pos,doubles};renderAll();return}if(pd.owner!==S.cur&&!pd.mortgaged){S.phase='rent';S.pending={pos:p.pos,doubles,rent:rentFor(p.pos),from:S.cur,to:pd.owner};renderAll();log(`${p.name} owes ${S.players[pd.owner].name} £${S.pending.rent} for ${sp.n}.`);return}}if(doubles){S.rolled=false;log(`${p.name} rolled doubles. Roll again.`)}else S.phase='done';renderAll();scheduleSave()}
function rentFor(pos){const sp=SP[pos],pd=S.props[pos];if(sp.t==='st'){let n=owned(pd.owner).filter(k=>SP[k].t==='st').length;return [25,50,100,200][n-1]||25}if(sp.t==='ut'){let n=owned(pd.owner).filter(k=>SP[k].t==='ut').length;return (S.dice[0]+S.dice[1])*(n>1?10:4)}let lvl=pd.hotel?5:pd.houses,base=sp.r[lvl];let group=groupProps(sp.g),mono=group.every(k=>S.props[k].owner===pd.owner);return mono&&lvl===0?base*2:base}
function payRent(){const q=S.pending;if(!q||S.phase!=='rent')return;changeMoney(q.from,-q.rent);changeMoney(q.to,q.rent);log(`${S.players[q.from].name} paid £${q.rent} rent to ${S.players[q.to].name}.`);S.phase=S.players[q.from].money<0?'debt':'done';S.pending=null;renderAll()}
function payBank(pi,amt){changeMoney(pi,-amt);if(S.options.parking)S.freePot+=amt;log(`${S.players[pi].name} paid £${amt}.`);S.phase=S.players[pi].money<0?'debt':'done'}
function buy(){const q=S.pending;if(!q)return;const sp=SP[q.pos],p=S.players[S.cur];if(p.money<sp.price)return;changeMoney(S.cur,-sp.price);S.props[q.pos].owner=S.cur;log(`${p.name} bought ${sp.n} for £${sp.price}.`);S.phase=q.doubles?'ready':'done';S.rolled=!q.doubles;S.pending=null;renderAll()}
function passBuy(){const d=S.pending?.doubles;S.pending=null;S.phase=d?'ready':'done';S.rolled=!d;renderAll()}
function auctionStart(){showAuction(S.pending?.pos)}
function drawCard(type){const p=S.players[S.cur];const isChance=type==='ch';const cards=isChance?[{m:'Advance to GO. Collect £200.',fn:async()=>moveTo(0,true)},{m:'Go directly to Jail.',fn:async()=>goJail(S.cur)},{m:'Bank pays you £50.',fn:async()=>changeMoney(S.cur,50)},{m:'Pay £15.',fn:async()=>payBank(S.cur,15)}]:[{m:'Advance to GO. Collect £200.',fn:async()=>moveTo(0,true)},{m:'Bank error in your favour. Collect £200.',fn:async()=>changeMoney(S.cur,200)},{m:'Doctor fee. Pay £50.',fn:async()=>payBank(S.cur,50)},{m:'Get Out of Jail Free.',fn:async()=>{p.jailFree++;log(`${p.name} received a Jail Free card.`)}}];const c=cards[rand(cards.length)-1];modal(`<h2>${isChance?'Chance':'Community Chest'}</h2><p>${c.m}</p><div class="modal-actions"><button class="primary-btn" onclick="Game.applyCard()">Continue</button></div>`,false);S.pending={card:c,doubles:false,cardBusy:false};S.phase='card'}
async function applyCard(){if(!S.pending?.card||S.pending.cardBusy)return;S.pending.cardBusy=true;try{closeModal();await S.pending.card.fn();if(S.phase!=='done'&&S.phase!=='debt'&&S.phase!=='handoff')S.phase='done';S.pending=null;renderAll()}catch(e){log('Something went wrong. Try again.');S.pending.cardBusy=false}}
async function moveTo(to,collect){const p=S.players[S.cur],prev=p.pos,steps=(to-prev+40)%40;await moveSteps(S.cur,steps,true);if(collect&&to<prev)passGo(S.cur);landOn(false)}
function goJail(pi){const p=S.players[pi];p.pos=10;p.jail=true;p.jailTurns=0;S.phase='done';S.rolled=true;log(`${p.name} went to Jail.`);renderAll()}
function showJailOptions(){S.phase='jailChoice';log(`${S.players[S.cur].name} is in Jail. Roll doubles, pay £50, or use a card.`);renderAll()}
function payBail(){const p=S.players[S.cur];if(p.money<50)return;changeMoney(S.cur,-50);p.jail=false;p.jailTurns=0;S.phase='ready';S.rolled=false;log(`${p.name} paid £50 bail. Tap dice to roll.`);renderAll()}
function useJailFree(){const p=S.players[S.cur];if(!p.jailFree)return;p.jailFree--;p.jail=false;p.jailTurns=0;S.phase='ready';S.rolled=false;log(`${p.name} used a Jail Free card. Tap dice to roll.`);renderAll()}
function endTurn(){S.pending=null;S.rolled=false;S.phase='handoff';let next=(S.cur+1)%S.players.length;while(S.players[next].bankrupt)next=(next+1)%S.players.length;if(next<=S.cur)S.round++;S.cur=next;S.turn++;renderAll();scheduleSave();showHandoff()}
function showHandoff(){modal(`<h2>Pass to ${S.players[S.cur].name}</h2><p>Tap below when ${S.players[S.cur].name} has the iPad.</p><div class="modal-actions"><button class="primary-btn" onclick="Game.beginTurn()">Start Turn</button></div>`,false)}function beginTurn(){closeModal();S.phase='ready';log(`${S.players[S.cur].name}, your turn.`);renderAll()}
function groupProps(g){return SP.map((s,i)=>s.t==='p'&&s.g===g?i:null).filter(i=>i!=null)}function groupSold(g){return groupProps(g).every(i=>S.props[i].owner!=null)}
function showBuild(){const rows=owned(S.cur).filter(i=>SP[i].t==='p').map(i=>{const sp=SP[i],pd=S.props[i],can=groupSold(sp.g)&&!pd.mortgaged;return `<div class="list-row"><div class="row-title">${sp.n}</div><div class="row-sub">${pd.hotel?'Hotel':pd.houses+' houses'} · ${can?'Build unlocked':'Building locked'}</div>${can?`<div class="modal-actions"><button onclick="Game.build(${i})">Build</button><button onclick="Game.sellBuild(${i})">Sell</button></div>`:''}</div>`}).join('')||'<p>No buildable properties.</p>';modal(`<h2>Build</h2><p>Houses available: ${housesAvail()} · Hotels available: ${hotelsAvail()}</p><div class="list">${rows}</div><div class="modal-actions"><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>`,true)}
function level(i){const pd=S.props[i];return pd.hotel?5:pd.houses}function housesUsed(){return Object.values(S.props).reduce((a,p)=>a+(p.houses||0),0)}function hotelsUsed(){return Object.values(S.props).reduce((a,p)=>a+(p.hotel?1:0),0)}function housesAvail(){return 32-housesUsed()}function hotelsAvail(){return 12-hotelsUsed()}
function build(i){const sp=SP[i],pd=S.props[i];if(!groupSold(sp.g)||pd.owner!==S.cur||S.players[S.cur].money<sp.hc)return;if(pd.hotel)return;if(pd.houses<4){if(housesAvail()<1)return;pd.houses++}else{if(hotelsAvail()<1)return;pd.houses=0;pd.hotel=true}changeMoney(S.cur,-sp.hc);log(`${S.players[S.cur].name} built on ${sp.n}.`);renderAll();showBuild()}
function sellBuild(i){const sp=SP[i],pd=S.props[i];if(pd.owner!==S.cur)return;if(pd.hotel){if(housesAvail()<4){log('Not enough bank houses to break this hotel.');return}pd.hotel=false;pd.houses=4}else if(pd.houses>0)pd.houses--;else return;changeMoney(S.cur,Math.floor(sp.hc/2));log(`${S.players[S.cur].name} sold a building on ${sp.n}.`);renderAll();showBuild()}
function showAuction(pos){if(pos==null)return;const sp=SP[pos];modal(`<h2>Auction</h2><p>${sp.n}</p><input id="auctionBid" class="name-input" type="number" value="10" min="10"><div class="modal-actions">${S.players.map((p,i)=>`<button onclick="Game.auctionBid(${pos},${i})">${p.name} Bid</button>`).join('')}<button class="ghost-btn" onclick="Game.closeModal();Game.passBuy()">Cancel</button></div>`,true)}
function auctionBid(pos,pi){const bid=+$('auctionBid').value||0,sp=SP[pos],p=S.players[pi];if(bid<10||bid>p.money){log('Invalid auction bid.');return}changeMoney(pi,-bid);S.props[pos].owner=pi;log(`${p.name} won ${sp.n} at auction for £${bid}.`);closeModal();S.phase='done';S.pending=null;renderAll()}
function showTrade(){
  const rivals=S.players.map((p,i)=>({p,i})).filter(x=>x.i!==S.cur&&!x.p.bankrupt);
  const buttons=rivals.map(({p,i})=>`<button class="list-row" onclick="Game.openTrade(${i})"><div class="row-title">Trade with ${p.name}</div><div class="row-sub">${owned(i).length} assets available</div></button>`).join('');
  modal(`<h2>Trade</h2><p>Choose a player, then tap one property from each side to exchange.</p><div class="list">${buttons||'<p>No available players.</p>'}</div><div class="modal-actions"><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>`,true)
}
function openTrade(target){tradeDraft={target,give:null,receive:null};renderTradeModal()}
function tradeList(owner,side){
  const items=owned(owner);
  if(!items.length)return '<div class="list-row"><div class="row-title">No properties</div><div class="row-sub">Nothing to select.</div></div>';
  return items.map(pos=>{const sp=SP[pos],sel=tradeDraft&&tradeDraft[side]===pos?' selected':'';return `<button class="list-row${sel}" onclick="Game.selectTrade('${side}',${pos})"><div class="row-title">${sp.n}</div><div class="row-sub">Rent ${rentPreview(pos)}</div></button>`}).join('')
}
function renderTradeModal(){
  if(!tradeDraft)return showTrade();
  const target=tradeDraft.target,me=S.cur,ready=tradeDraft.give!=null&&tradeDraft.receive!=null;
  modal(`<h2>Trade</h2><p>${S.players[me].name} swaps with ${S.players[target].name}</p><div class="trade-grid"><div><h3>${S.players[me].name} gives</h3><div class="list">${tradeList(me,'give')}</div></div><div><h3>${S.players[target].name} gives</h3><div class="list">${tradeList(target,'receive')}</div></div></div><div class="modal-actions"><button class="primary-btn" ${ready?'':'disabled'} onclick="Game.executeTrade()">Exchange Selected</button><button class="ghost-btn" onclick="Game.showTrade()">Choose Different Player</button><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>`,true)
}
function selectTrade(side,pos){if(!tradeDraft)return;tradeDraft[side]=pos;renderTradeModal()}
function executeTrade(){
  if(!tradeDraft)return;const {target,give,receive}=tradeDraft;
  if(S.props[give]?.owner!==S.cur||S.props[receive]?.owner!==target){log('Trade could not be completed because ownership changed.');tradeDraft=null;closeModal();renderAll();return}
  S.props[give].owner=target;S.props[receive].owner=S.cur;
  log(`${S.players[S.cur].name} traded ${SP[give].n} for ${SP[receive].n} with ${S.players[target].name}.`);
  tradeDraft=null;closeModal();renderAll();scheduleSave()
}
function showAssets(i){const rows=owned(i).map(pos=>`<button class="list-row" onclick="Game.showDeed(${pos})"><div class="row-title">${SP[pos].n}</div><div class="row-sub">Rent £${rentPreview(pos)}</div></button>`).join('')||'<p>No properties yet.</p>';modal(`<h2>${S.players[i].name} Assets</h2><div class="list">${rows}</div><div class="modal-actions"><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>`,true)}function rentPreview(pos){const sp=SP[pos],pd=S.props[pos];if(sp.t==='p')return sp.r[pd.hotel?5:pd.houses];if(sp.t==='st')return 25;if(sp.t==='ut')return 'dice × 4';return 0}
function showDeed(pos){const sp=SP[pos],pd=S.props[pos];if(!sp)return;modal(`<h2>${sp.n}</h2><p>${pd?`Owner: ${pd.owner==null?'Unowned':S.players[pd.owner].name}`:'Board space'}</p><div class="list">${sp.r?sp.r.map((r,i)=>`<div class="list-row"><div class="row-title">${i===5?'Hotel':i+' houses'}</div><div class="row-sub">Rent £${r}</div></div>`).join(''):''}</div><div class="modal-actions"><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>`,true)}
function historyMarkup(){
  if(!S.history.length)return '<p>No history yet.</p>';
  let last=null,out='';
  S.history.slice().reverse().forEach(h=>{
    const r=h.r||1;
    if(r!==last){last=r;out+=`<div class="history-round">ROUND ${r}</div>`}
    out+=`<div class="list-row"><div class="row-sub">Turn ${h.turn||''} · ${h.t||''}</div><div class="row-title">${h.m}</div></div>`;
  });
  return out;
}
function showHistory(){modal(`<h2>History</h2><p>Round ${S.round} · Turn ${S.turn}</p><div class="list">${historyMarkup()}</div><div class="modal-actions"><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>`,true)}
function showRules(){modal('<h2>Rules</h2><p>Colour groups unlock for building when every property in that colour has been bought. Build only on property you own. House supply is limited to 32 houses and 12 hotels.</p><div class="modal-actions"><button class="ghost-btn" onclick="Game.closeModal()">Close</button></div>',true)}
function showDebt(){modal(`<h2>Debt</h2><p>${S.players[S.cur].name} is below £0. Sell buildings or declare bankruptcy.</p><div class="modal-actions"><button class="primary-btn" onclick="Game.declareBankruptcy(${S.cur})">Bankruptcy</button></div>`,false)}function declareBankruptcy(i){S.players[i].bankrupt=true;owned(i).forEach(pos=>{S.props[pos]={owner:null,houses:0,hotel:false,mortgaged:false}});log(`${S.players[i].name} declared bankruptcy.`);renderAll();endTurn()}
function highlightOwner(i){document.querySelectorAll('[data-pos]').forEach(el=>el.style.opacity='1');owned(i).forEach(pos=>{const el=document.querySelector(`[data-pos="${pos}"]`);if(el){el.style.filter='drop-shadow(0 0 7px '+S.players[i].color+')';setTimeout(()=>el.style.filter='',1200)}})}
function modal(html,canClose=true){$('modalCard').innerHTML=(canClose?'<button class="close" aria-label="Close modal" onclick="Game.closeModal()">×</button>':'')+html;$('modal').dataset.canClose=canClose?'1':'0';$('modal').classList.add('open');applyA11y($('modalCard'))}function closeModal(){$('modal').classList.remove('open')}function backdrop(e){if(e.target.id==='modal'&&$('modal').dataset.canClose==='1')closeModal()}
function resetToSetup(){if(!confirm('Start a new game? Current saved game will stay unless cleared.'))return;S.started=false;$('game').classList.remove('active');$('setup').classList.add('active');drawSetup()}
window.Game={pickToken,startGame,continueGame,clearSave,rollDice,buy,passBuy,auctionStart,auctionBid,payRent,payBail,useJailFree,endTurn,beginTurn,showBuild,build,sellBuild,showTrade,openTrade,selectTrade,executeTrade,showAssets,showDeed,showHistory,showRules,closeModal,backdrop,resetToSetup,declareBankruptcy,showDebt,applyCard};
drawSetup();$('continueBtn').style.display=localStorage.getItem(SAVE_KEY)?'block':'none';applyA11y(document);
})();
</script>
</body>
